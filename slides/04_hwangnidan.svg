<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Noto Serif KR', serif">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1008"/>
      <stop offset="100%" stop-color="#0d0804"/>
    </radialGradient>
    <radialGradient id="glow4" cx="75%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="div4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b7355" stop-opacity="0"/>
      <stop offset="40%" stop-color="#8b7355" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8b7355" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg4)"/>
  <rect width="800" height="500" fill="url(#glow4)"/>

  <!-- 별 -->
  <circle cx="40"  cy="28"  r="1"   fill="#fff" opacity="0.4"/>
  <circle cx="130" cy="44"  r="0.8" fill="#fff" opacity="0.35"/>
  <circle cx="220" cy="18"  r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="360" cy="36"  r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="680" cy="24"  r="1"   fill="#fff" opacity="0.45"/>
  <circle cx="750" cy="40"  r="0.8" fill="#fff" opacity="0.3"/>

  <!-- 왼쪽 콘텐츠 -->
  <text x="40" y="72" font-size="10" fill="#8b7355" letter-spacing="4">STAGE 04</text>
  <line x1="40" y1="80" x2="430" y2="80" stroke="#8b7355" stroke-width="0.5" opacity="0.4"/>

  <text x="40" y="132" font-size="38" fill="#d4a843" font-weight="bold" letter-spacing="2">황리단길</text>
  <text x="40" y="160" font-size="13" fill="#c4a882" letter-spacing="4">黃里段길  ·  HWANGNIDAN-GIL</text>
  <rect x="40" y="174" width="60" height="1.5" fill="#8b7355" opacity="0.8"/>

  <!-- 카드 -->
  <rect x="40"  y="192" width="185" height="78" rx="2" fill="#c4a882" fill-opacity="0.06" stroke="#8b7355" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="56"  y="213" font-size="9" fill="#8b7355" letter-spacing="3">ORIGIN</text>
  <text x="56"  y="235" font-size="13" fill="#f5efe6">황남동에서 유래</text>
  <text x="56"  y="254" font-size="11" fill="#c4a882">포석로 일대 골목 상권</text>

  <rect x="238" y="192" width="185" height="78" rx="2" fill="#c4a882" fill-opacity="0.06" stroke="#8b7355" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="254" y="213" font-size="9" fill="#8b7355" letter-spacing="3">VIBE</text>
  <text x="254" y="235" font-size="13" fill="#f5efe6">신라 + 힙스터</text>
  <text x="254" y="254" font-size="11" fill="#c4a882">한옥 카페 · 소품샵 · 야시장</text>

  <!-- 설명 -->
  <text x="40" y="310" font-size="13" fill="#f5efe6" opacity="0.9">대릉원을 따라 이어지는 경주 최고의 핫플레이스.</text>
  <text x="40" y="330" font-size="13" fill="#f5efe6" opacity="0.9">이태원 경리단길에서 이름을 따 '황리단길'로 불려요.</text>
  <text x="40" y="360" font-size="13" fill="#c4a882" opacity="0.8">오래된 한옥과 감각적인 카페가 어우러진 골목으로,</text>
  <text x="40" y="380" font-size="13" fill="#c4a882" opacity="0.8">야경이 특히 아름다운 저녁 시간대가 제격이에요.</text>

  <!-- 퀴즈 힌트 -->
  <rect x="40" y="410" width="400" height="44" rx="2" fill="#d4a843" fill-opacity="0.08" stroke="#d4a843" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="56" y="428" font-size="9" fill="#d4a843" letter-spacing="3">QUIZ HINT</text>
  <text x="56" y="447" font-size="12" fill="#d4a843">현장을 눈여겨보고, '황'의 동네 이름을 기억하세요.</text>

  <!-- 세로 구분선 -->
  <rect x="450" y="40" width="1" height="420" fill="url(#div4)" opacity="0.35"/>

  <!-- 오른쪽 골목 일러스트 -->
  <!-- 하늘 배경 -->
  <rect x="451" y="40" width="349" height="420" fill="#120e08" opacity="0.5"/>

  <!-- 골목길 바닥 -->
  <path d="M520 460 L560 200 L680 200 L720 460Z" fill="#1e1808" opacity="0.9"/>
  <path d="M522 460 L562 202 L678 202 L718 460Z" fill="none" stroke="#3a3020" stroke-width="0.8" opacity="0.5"/>
  <!-- 돌바닥 패턴 -->
  <line x1="522" y1="380" x2="718" y2="380" stroke="#2a2410" stroke-width="1" opacity="0.5"/>
  <line x1="530" y1="320" x2="710" y2="320" stroke="#2a2410" stroke-width="1" opacity="0.4"/>
  <line x1="540" y1="260" x2="700" y2="260" stroke="#2a2410" stroke-width="0.8" opacity="0.3"/>

  <!-- 왼쪽 건물 (한옥 느낌) -->
  <rect x="460" y="210" width="90" height="250" fill="#2a1e0e" opacity="0.95"/>
  <!-- 기와 지붕 -->
  <path d="M450 215 Q505 190 560 215" fill="#1a1208" stroke="#3d2b10" stroke-width="1"/>
  <path d="M454 218 Q505 195 556 218" fill="none" stroke="#5a4020" stroke-width="0.8" opacity="0.6"/>
  <!-- 창문 -->
  <rect x="472" y="250" width="28" height="36" rx="1" fill="#0d0a04" stroke="#5a4020" stroke-width="0.8"/>
  <rect x="512" y="250" width="28" height="36" rx="1" fill="#0d0a04" stroke="#5a4020" stroke-width="0.8"/>
  <!-- 창문 불빛 -->
  <rect x="473" y="251" width="26" height="34" rx="1" fill="#d4a843" opacity="0.12"/>
  <rect x="513" y="251" width="26" height="34" rx="1" fill="#d4a843" opacity="0.10"/>
  <!-- 간판 -->
  <rect x="466" y="306" width="74" height="20" rx="1" fill="#3d2b10"/>
  <text x="503" y="320" font-size="8" fill="#c4a882" text-anchor="middle" opacity="0.9">소품샵</text>

  <!-- 오른쪽 건물 -->
  <rect x="650" y="220" width="100" height="240" fill="#261a0c" opacity="0.95"/>
  <!-- 기와 지붕 -->
  <path d="M640 225 Q700 198 760 225" fill="#1a1208" stroke="#3d2b10" stroke-width="1"/>
  <path d="M644 228 Q700 203 756 228" fill="none" stroke="#5a4020" stroke-width="0.8" opacity="0.6"/>
  <!-- 창문 -->
  <rect x="662" y="260" width="30" height="38" rx="1" fill="#0d0a04" stroke="#5a4020" stroke-width="0.8"/>
  <rect x="706" y="260" width="30" height="38" rx="1" fill="#0d0a04" stroke="#5a4020" stroke-width="0.8"/>
  <rect x="663" y="261" width="28" height="36" rx="1" fill="#d4a843" opacity="0.14"/>
  <rect x="707" y="261" width="28" height="36" rx="1" fill="#d4a843" opacity="0.11"/>
  <!-- 간판 -->
  <rect x="656" y="318" width="80" height="20" rx="1" fill="#3d2b10"/>
  <text x="696" y="332" font-size="8" fill="#c4a882" text-anchor="middle" opacity="0.9">카페</text>

  <!-- 가로등 -->
  <line x1="576" y1="460" x2="576" y2="260" stroke="#5a4020" stroke-width="2.5"/>
  <path d="M576 260 Q588 252 594 262" fill="none" stroke="#5a4020" stroke-width="2"/>
  <circle cx="596" cy="264" r="5" fill="#d4a843" opacity="0.7"/>
  <circle cx="596" cy="264" r="12" fill="#d4a843" opacity="0.08"/>

  <!-- 달 -->
  <circle cx="620" cy="100" r="22" fill="#f5efe6" opacity="0.08"/>
  <circle cx="625" cy="96"  r="18" fill="#120e08" opacity="0.6"/>

  <text x="780" y="482" font-size="10" fill="#8b7355" text-anchor="end" opacity="0.6">04 / 04</text>
</svg>
